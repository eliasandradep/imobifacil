{% extends 'admin/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h4 fw-bold">Tipos de Imóvel</h2>
    <a href="{{ url_for('admin.novo_tipo') }}" class="btn btn-primary shadow-sm">
        <i class="bi bi-plus-circle"></i> Novo Tipo
    </a>
</div>

<div class="card shadow-sm border-0">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">Nome do Tipo</th>
                    <th>Prefixo</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for tipo in tipos %}
                <tr>
                    <td class="ps-4 fw-bold">{{ tipo.nome }}</td>
                    <td><span class="badge bg-secondary">{{ tipo.prefixo }}</span></td>
                    <td class="text-center">
                        <form action="{{ url_for('admin.excluir_tipo', id=tipo.id) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Excluir?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
