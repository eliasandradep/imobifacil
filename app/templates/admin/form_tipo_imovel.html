{% extends 'admin/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4">
            <h4 class="fw-bold mb-4">Cadastrar Tipo</h4>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome (Ex: Apartamento)</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Prefixo (Ex: AP)</label>
                    <input type="text" name="prefixo" class="form-control" maxlength="3" required style="text-transform: uppercase;">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Salvar Tipo</button>
                    <a href="{{ url_for('admin.listar_tipos') }}" class="btn btn-light border w-50">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
