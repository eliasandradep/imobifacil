<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Master — ImobiFácil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0533 0%, #2d0057 50%, #1a0533 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 2.5rem 2.25rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,.35);
        }
        .logo-area { text-align: center; margin-bottom: 2rem; }
        .logo-area h2 { font-weight: 800; color: #1a0533; letter-spacing: -.5px; }
        .logo-area h2 span { color: #a855f7; }
        .logo-area .badge-master {
            display: inline-block;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            font-size: .65rem;
            padding: .25rem .75rem;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: .25rem;
        }
        .form-control:focus { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,.15); }
        .btn-master {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            color: #fff;
            width: 100%;
            padding: .75rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity .2s;
        }
        .btn-master:hover { opacity: .9; color: #fff; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-area">
        <h2>Imobi<span>Fácil</span></h2>
        <span class="badge-master">Painel Master</span>
        <p class="text-muted small mt-3 mb-0">Acesso restrito ao administrador da plataforma.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 mb-3" style="font-size:.88rem;border-radius:10px;">
            {{ message }}
        </div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold small">E-mail</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" name="email" class="form-control" placeholder="master@imobifacil.com" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold small">Senha</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn btn-master">
            <i class="bi bi-shield-lock me-2"></i> Entrar no Painel Master
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
